name: CI

on:
  pull_request:
        branches:
            - develop
        paths-ignore:
          - 'README.ms'




jobs: 
    test: 
        runs-on: ubuntu-latest
        steps:
            - name: Checkout do código
              uses: actions/checkout@v4

            - name: Instala o Node
              uses: actions/setup-node@v4
              with: 
                node-version: 22
            - name: Instala dependências
              run: npm install 
            - name: Roda os testes
              run: npm test
    build:
      runs-on: ubuntu-latest
      needs: test
      steps:
        - name: Checkout do código
          uses: actions/checkout@v4
        - name: Instala o Node
          uses: actions/setup-node@v4
          with: 
            node-version: 22
        - name: Instala dependências
          run: npm install

        - name: Rodar o build
          run: npm run build
        