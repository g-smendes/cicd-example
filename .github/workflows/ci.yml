name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs: 
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instala o Node
        uses: actions/setup-node@v4
        with: 
          node-version: 22

      - name: Instala dependências
        run: npm install 

      - name: Roda os testes
        run: npm test